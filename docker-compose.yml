services:
  app:
    build:
      context: .
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: local
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: utifarm
      POSTGRES_USER: utifarm
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
